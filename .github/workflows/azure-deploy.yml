name: Deploy to Azure Functions

# Trigger manually from the Actions UI.
# Required GitHub secrets:
#   AZURE_FUNCTIONAPP_NAME       — name of the Azure Function App resource
#   AZURE_FUNCTIONAPP_PUBLISH_PROFILE — publish profile XML from Azure Portal
#     (Function App → Overview → Get publish profile)
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      functionapp_name:
        description: 'Azure Function App name (overrides secret if set)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for tag enumeration
          fetch-tags: true

      - name: Check if schema changed
        id: schema_check
        run: |
          LAST_TAG=$(git tag -l 'schema-bump-*' | sort -V | tail -1)
          if [ -z "$LAST_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff "$LAST_TAG" HEAD -- src/traveller_gen/traveller_world_schema.json | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag schema bump
        if: steps.schema_check.outputs.changed == 'true'
        run: |
          NEXT=$(( $(git tag -l 'schema-bump-*' | wc -l) + 1 ))
          git tag "schema-bump-$NEXT"
          git push origin "schema-bump-$NEXT"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute version
        run: bash scripts/compute_version.sh ${{ github.run_number }}

      - name: Assemble deployment package
        run: |
          # Install the traveller-gen package into azure-api/ via pip --target.
          # --no-deps: Jinja2 and jsonschema are declared in azure-api/requirements.txt.
          pip install --quiet --target azure-api/ --no-deps .
          # Copy fastapi/ separately (it is not part of the Python package)
          cp -r fastapi azure-api/fastapi

      - name: Install dependencies into package
        run: pip install --target azure-api/.python_packages/lib/site-packages -r azure-api/requirements.txt

      - name: Deploy
        uses: azure/functions-action@v1
        with:
          app-name: ${{ inputs.functionapp_name || secrets.AZURE_FUNCTIONAPP_NAME }}
          package: azure-api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
